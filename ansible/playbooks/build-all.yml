---
# build-all.yml – build-infra → boot → install-infra-apps を順に実行する
- name: Step 1/3 – Build infrastructure (Terraform)
  ansible.builtin.import_playbook: build-infra.yml

- name: Step 2/3 – Boot Flatcar Linux on all nodes
  ansible.builtin.import_playbook: boot.yml

- name: Step 3/3 – Install ArgoCD and infra apps
  ansible.builtin.import_playbook: install-infra-apps.yml
