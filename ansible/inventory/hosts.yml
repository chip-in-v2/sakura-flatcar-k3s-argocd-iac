---
# インベントリ
# サーバの ansible_host は各 playbook の冒頭で terraform output から動的に設定される

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ ansible_playbook_python }}"

  children:
    servers:
      hosts:
        chip-inx-sv1:
        chip-inx-sv2:
        chip-inx-sv3:
